name: Boreal Wx AI Scribe

# Wakes up at 6:00 AM, 12:00 PM, and 5:00 PM EDT
on:
  schedule:
    - cron: '0 10,16,21 * * *'
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create AI Script
        run: |
          cat << 'EOF' > scribe.py
          import urllib.request, json, os

          # The Upgraded Multi-Weather Escape Prompt
          prompt = """You are the Boreal Wx Scribe—an authentic, warm, witty Canadian mentor and tactical travel guide.
          Generate a daily Canadian newcomer guide and Escape Plan travel manifest for today. You must provide 4 distinct variations based on local weather conditions.
          
          For each weather condition (Clear, Rain, Snow, Heat), provide:
          1. "headline": A warm national greeting using light Canadian slang.
          2. "lifestyle": A practical newcomer lifestyle tip specific to that weather.
          3. "wisdom": A positive Canadian Pride fact.
          4. "escape_manifest": A strict, tactical trunk-packing list or vehicle warning for highway travel in this specific weather.
          5. "road_trip_slang": A charming explanation of Canadian road trip culture, long weekends, or travel slang (e.g., 'klicks', 'Loonies', 'May Two-Four', 'Double-Double').

          Return ONLY a single valid JSON object matching this exact structure:
          {
            "clear": {"headline": "...", "lifestyle": "...", "wisdom": "...", "escape_manifest": "...", "road_trip_slang": "..."},
            "rain": {"headline": "...", "lifestyle": "...", "wisdom": "...", "escape_manifest": "...", "road_trip_slang": "..."},
            "snow": {"headline": "...", "lifestyle": "...", "wisdom": "...", "escape_manifest": "...", "road_trip_slang": "..."},
            "heat": {"headline": "...", "lifestyle": "...", "wisdom": "...", "escape_manifest": "...", "road_trip_slang": "..."}
          }
          Do not include any markdown styling or conversational text."""

          # Request AI Generation
          api_key = os.environ.get('GEMINI_API_KEY')
          g_url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key={api_key}'
          payload = {'contents': [{'parts': [{'text': prompt}]}]}
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(g_url, data=data, headers={'Content-Type': 'application/json'})

          try:
              response = urllib.request.urlopen(req)
              res = json.loads(response.read())
              ai_text = res['candidates'][0]['content']['parts'][0]['text']
              ai_text = ai_text.replace('```json', '').replace('```', '').strip()
              
              json.loads(ai_text)
              
              os.makedirs('public', exist_ok=True)
              with open('public/canadian_wisdom.json', 'w') as f:
                  f.write(ai_text)
              print("Successfully generated Upgraded Escape Matrix!")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Execute AI Scribe
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scribe.py

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
