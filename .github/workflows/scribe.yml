name: Boreal Wx Master AI Matrix

# 4-Strike Daily Schedule (Times in UTC to hit 6:30 AM, 11:30 AM, 3:30 PM, 8:30 PM EDT)
on:
  schedule:
    - cron: '30 10,15,19,0 * * *'
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-boreal-matrix:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Build the Python Master Scribe
        run: |
          cat << 'EOF' > scribe.py
          import urllib.request, urllib.error, json, os, datetime, uuid

          today = datetime.datetime.now().strftime("%B %d, %Y")
          seed = str(uuid.uuid4())

          prompt = f"""You are the Boreal Wx AI—an elite Canadian meteorological and cultural intelligence engine.
          Generate today's ({today}) hyper-localized survival guides, travel manifests, and notifications.

          [ZERO REPEAT PROTOCOL ACTIVE]
          Seed Entropy: {seed}
          CRITICAL INSTRUCTION: You MUST generate 100% unique Canadian newcomer tips and slang that have NEVER been generated before. Do not recycle standard answers. Vary the tone, situations, and regions significantly.

          You must generate a strictly valid JSON object covering 5 Canadian climate regions: 
          "bc_coast", "prairies", "great_lakes", "east_coast", "the_north".

          For EACH region, provide 5 distinct weather categories: "clear", "cryo", "storm", "heat", "smoke".

          For EACH category, output this exact structure:
          {{
            "condition": "A realistic specific Canadian weather state for this category (e.g., Freezing Drizzle for cryo, Wildfire Smoke for smoke, Extreme Humidex for heat).",
            "notification": "A short, punchy push notification (max 120 chars) tailored to this specific condition.",
            "survival_guide": "A practical newcomer lifestyle or neighborhood tip for this weather.",
            "escape_manifest": "A strict, tactical long-distance highway or road-trip warning. Make this distinctly for travel/weekends.",
            "slang_hud": "A charming explanation of Canadian slang (e.g., 'Toque', 'Double-Double', 'Klicks')."
          }}

          At the root of the JSON object, include a "cultural_pulse" object containing:
          {{
            "historical_fact": "A positive Canadian history fact that happened on this exact date.",
            "holiday_alert": "An upcoming Canadian public holiday and a relevant travel tip."
          }}

          Return ONLY raw JSON. No markdown formatting, no backticks, no introductory text."""

          # Request AI Generation - Strip whitespace to prevent URL injection bugs
          api_key = os.environ.get('GEMINI_API_KEY', '').strip()
          
          # Using gemini-3.5-flash (2.0 was officially shut down in June 2026)
          g_url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key={api_key}'
          
          payload = {'contents': [{'parts': [{'text': prompt}]}]}
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(g_url, data=data, headers={'Content-Type': 'application/json'})

          try:
              response = urllib.request.urlopen(req)
              res = json.loads(response.read())
              ai_text = res['candidates'][0]['content']['parts'][0]['text']
              
              # Strip Markdown if AI hallucinated it
              ai_text = ai_text.replace('```json', '').replace('```', '').strip()
              
              # Rigid Validation Gate - Will crash script if JSON is invalid, saving the old file
              json_data = json.loads(ai_text)
              
              os.makedirs('public', exist_ok=True)
              with open('public/boreal_matrix.json', 'w') as f:
                  json.dump(json_data, f)
              print("Phase 1 Complete: Multi-Regional Matrix successfully generated and validated!")
          except urllib.error.HTTPError as e:
              print(f"CRITICAL HTTP FAILURE: {e.code} {e.reason}")
              print(f"URL Attempted: {g_url.replace(api_key, '***')}")
              try:
                  print(f"Response Body: {e.read().decode('utf-8')}")
              except:
                  pass
              exit(1)
          except Exception as e:
              print(f"CRITICAL FAILURE: {e}")
              exit(1)
          EOF

      - name: Execute Matrix Generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scribe.py

      - name: Upload Cloud Payload
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy Payload to Edge
        id: deployment
        uses: actions/deploy-pages@v4
